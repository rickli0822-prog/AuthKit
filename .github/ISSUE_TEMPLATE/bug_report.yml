name: 登录 / 代理问题反馈
description: Codex、Cursor 或 VS Code 登录失败、Token exchange、代理相关
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: client
    attributes:
      label: 目标客户端
      options:
        - Codex
        - Cursor
        - VS Code
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: 错误信息
      description: 请粘贴完整报错（如 Token exchange failed）
      placeholder: Token exchange failed ...
    validations:
      required: true

  - type: textarea
    id: json_report
    attributes:
      label: 诊断 JSON（推荐）
      description: 运行 `authkit check --json` 并粘贴输出（可脱敏代理 IP/端口）
      render: shell

  - type: checkboxes
    id: proxy
    attributes:
      label: 网络环境
      options:
        - label: 使用系统代理 / Clash / Surge 等
        - label: 设置了 HTTP_PROXY / HTTPS_PROXY 环境变量
        - label: 公司网络 / HTTPS 检查

  - type: textarea
    id: extra
    attributes:
      label: 补充说明
      description: 已尝试的修复步骤、Windows 版本等
