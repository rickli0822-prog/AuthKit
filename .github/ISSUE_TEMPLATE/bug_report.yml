name: Login or Proxy Problem
description: Report an AI client login, OAuth, proxy, CA, DNS, firewall, or repair issue.
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an AuthKit issue. Do not paste tokens, cookies,
        authorization headers, raw customer data, or unredacted support bundles.

  - type: dropdown
    id: client
    attributes:
      label: Target client
      description: Which AI client were you diagnosing?
      options:
        - Codex
        - Claude Code
        - Gemini
        - Cursor
        - VS Code
        - Multiple installed clients
        - Other
    validations:
      required: true

  - type: dropdown
    id: install_source
    attributes:
      label: AuthKit install source
      options:
        - Windows installer
        - Portable zip
        - pip install
        - Source checkout
        - Not sure
    validations:
      required: true

  - type: input
    id: authkit_version
    attributes:
      label: AuthKit version
      placeholder: "0.4.0"

  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"

  - type: dropdown
    id: failure_area
    attributes:
      label: Failure area
      options:
        - Login state detection
        - OAuth token exchange
        - OAuth callback port
        - Proxy mismatch
        - Network reachability
        - CA certificate
        - DNS cache
        - Winsock
        - Firewall outbound rule
        - Repair audit or rollback
        - GUI display or language
        - Support bundle export
        - Other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the failure and what you expected AuthKit to do.
      placeholder: "Codex login fails with token exchange timeout when system proxy differs from HTTPS_PROXY..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open AuthKit
        2. Select Codex
        3. Run scan
        4. See ...

  - type: textarea
    id: support_bundle
    attributes:
      label: Redacted support bundle or diagnostic output
      description: |
        Prefer `authkit bundle --client codex --out .\authkit-support-bundle.json --fast`.
        Review the file before posting.
      render: json

  - type: checkboxes
    id: environment
    attributes:
      label: Environment markers
      options:
        - label: I use a system proxy, Clash, Surge, or similar proxy tool.
        - label: I set HTTP_PROXY, HTTPS_PROXY, ALL_PROXY, or NO_PROXY.
        - label: I am on a company network with HTTPS inspection.
        - label: A repair action was executed.
        - label: A rollback action was executed.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, redacted logs, or notes about what you already tried.
